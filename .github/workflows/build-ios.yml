name: Build iOS (Unsigned IPA)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix pubspec.yaml (name & intl)
        run: |
          # 修改包名为小写（符合 Dart 规范）
          sed -i '' 's/^name: .*/name: vndb_app/' pubspec.yaml
          # 修复 intl 版本冲突
          sed -i '' 's/intl: \^0.20.2/intl: \^0.19.0/g' pubspec.yaml
          # 验证修改
          grep "^name:" pubspec.yaml
          grep "intl:" pubspec.yaml

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.0'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate iOS platform files
        run: |
          flutter create --platforms=ios --org=com.hjy .
          # flutter create 会重置 pubspec.yaml，需要再次修复
          sed -i '' 's/^name: .*/name: vndb_app/' pubspec.yaml
          sed -i '' 's/intl: \^0.20.2/intl: \^0.19.0/g' pubspec.yaml

      - name: Set Bundle ID
        run: |
          cd ios
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = .*/PRODUCT_BUNDLE_IDENTIFIER = com.hjy.vndbclient;/g' Runner.xcodeproj/project.pbxproj
          grep "PRODUCT_BUNDLE_IDENTIFIER" Runner.xcodeproj/project.pbxproj | head -5
          cd ..

      - name: Fix Podfile platform version
        run: |
          cd ios
          if [ ! -f Podfile ]; then
            echo "platform :ios, '12.0'" > Podfile
            echo "target 'Runner' do" >> Podfile
            echo "  use_frameworks!" >> Podfile
            echo "  use_modular_headers!" >> Podfile
            echo "  flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))" >> Podfile
            echo "end" >> Podfile
            echo "post_install do |installer|" >> Podfile
            echo "  installer.pods_project.targets.each do |target|" >> Podfile
            echo "    flutter_additional_ios_build_settings(target)" >> Podfile
            echo "  end" >> Podfile
            echo "end" >> Podfile
          else
            sed -i '' 's/# platform :ios, .*/platform :ios, '\''12.0'\''/' Podfile
          fi
          cat Podfile | grep "platform :ios"
          cd ..

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS (unsigned)
        run: |
          flutter build ios --release --no-codesign
          
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r ../VNclient-unsigned.ipa Payload/
          cd -

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: VNclient-unsigned-ipa
          path: build/ios/VNclient-unsigned.ipa

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: VNclient-app
          path: build/ios/iphoneos/Runner.app