name: Build iOS (Unsigned IPA)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix pubspec.yaml (name & intl)
        run: |
          sed -i '' 's/^name: VNclient/name: vnclient/' pubspec.yaml
          sed -i '' 's/intl: \^0.20.2/intl: \^0.19.0/g' pubspec.yaml
          echo "=== 修改后的 pubspec.yaml 关键字段 ==="
          grep -E "^(name|intl):" pubspec.yaml

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.0'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate iOS platform files
        run: |
          flutter create --platforms=ios --org=com.hjy --project-name=vnclient .
          sed -i '' 's/^name: .*/name: vnclient/' pubspec.yaml
          sed -i '' 's/intl: \^0.20.2/intl: \^0.19.0/g' pubspec.yaml
          echo "=== 生成 iOS 平台后的 pubspec.yaml ==="
          grep -E "^(name|intl):" pubspec.yaml

      - name: Set Bundle ID
        run: |
          cd ios
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = .*/PRODUCT_BUNDLE_IDENTIFIER = com.hjy.vnclient;/g' Runner.xcodeproj/project.pbxproj
          grep "PRODUCT_BUNDLE_IDENTIFIER" Runner.xcodeproj/project.pbxproj | head -5
          cd ..

      - name: Disable code signing
        run: |
          # 修改 Runner 项目签名配置
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development"/CODE_SIGN_IDENTITY = ""/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer"/CODE_SIGN_IDENTITY = ""/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = "";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/"CODE_SIGN_IDENTITY[s]* = .*/"CODE_SIGN_IDENTITY" = "";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES;/CODE_SIGNING_ALLOWED = NO;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g' ios/Runner.xcodeproj/project.pbxproj
          
          echo "=== Runner 签名配置已禁用 ==="
          grep -E "CODE_SIGN_STYLE|CODE_SIGN_IDENTITY|DEVELOPMENT_TEAM|CODE_SIGNING_ALLOWED|CODE_SIGNING_REQUIRED" ios/Runner.xcodeproj/project.pbxproj | head -10

      - name: Fix Podfile platform version
        run: |
          cd ios
          if [ ! -f Podfile ]; then
            echo "platform :ios, '12.0'" > Podfile
            echo "target 'Runner' do" >> Podfile
            echo "  use_frameworks!" >> Podfile
            echo "  use_modular_headers!" >> Podfile
            echo "  flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))" >> Podfile
            echo "end" >> Podfile
            echo "post_install do |installer|" >> Podfile
            echo "  installer.pods_project.targets.each do |target|" >> Podfile
            echo "    flutter_additional_ios_build_settings(target)" >> Podfile
            echo "    target.build_configurations.each do |config|" >> Podfile
            echo "      config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'" >> Podfile
            echo "    end" >> Podfile
            echo "  end" >> Podfile
            echo "end" >> Podfile
          else
            sed -i '' 's/# platform :ios, .*/platform :ios, '\''12.0'\''/' Podfile
            if ! grep -q "CODE_SIGNING_ALLOWED.*NO" Podfile; then
              sed -i '' '/post_install do |installer|/a\
              \  installer.pods_project.targets.each do |target|\
              \    target.build_configurations.each do |config|\
              \      config.build_settings['\''CODE_SIGNING_ALLOWED'\''] = '\''NO'\''\
              \    end\
              \  end
              ' Podfile
            fi
          fi
          echo "=== Podfile 配置 ==="
          cat Podfile | grep -E "platform :ios|CODE_SIGNING_ALLOWED"
          cd ..

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS (unsigned)
        run: |
          flutter build ios --release --no-codesign
          
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r ../VNclient-unsigned.ipa Payload/
          cd -

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: VNclient-unsigned-ipa
          path: build/ios/VNclient-unsigned.ipa

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: VNclient-app
          path: build/ios/iphoneos/Runner.app