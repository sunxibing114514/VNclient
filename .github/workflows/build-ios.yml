name: Build iOS (Unsigned IPA)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix intl version conflict
        run: |
          # 将 intl ^0.20.2 替换为 ^0.19.0
          sed -i '' 's/intl: \^0.20.2/intl: \^0.19.0/g' pubspec.yaml
          # 或者用下面的命令（更通用）
          # sed -i '' 's/intl:.*/intl: ^0.19.0/g' pubspec.yaml
          cat pubspec.yaml | grep intl  # 验证修改

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.0'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS (unsigned)
        run: |
          flutter build ios --release --no-codesign
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r ../VNclient-unsigned.ipa Payload/
          cd -

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: VNclient-unsigned-ipa
          path: build/ios/VNclient-unsigned.ipa

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: VNclient-app
          path: build/ios/iphoneos/Runner.app